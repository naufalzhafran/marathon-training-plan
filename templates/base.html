<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Marathon Training{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div>
        <h1>Marathon Training</h1>
        <div class="sub">Maybank Virgin · 23 Aug 2026</div>
      </div>
    </div>
    <nav>
      <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
      <a href="/activities/new" {% if "/activities" in request.url.path %}class="active"{% endif %}>Log Activity</a>
      <a href="/body/new" {% if "/body" in request.url.path %}class="active"{% endif %}>Body Metrics</a>
      <a href="/ai" {% if request.url.path == "/ai" %}class="active"{% endif %}>AI Handoff</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Local SQLite training tracker · Recommendations are advisory, not medical advice</footer>
</body>
</html>
